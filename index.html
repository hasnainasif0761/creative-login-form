<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignUp Form</title>
  <!-- TailwindCss CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <!-- Box Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body class="min-h-screen bg-sky-100 flex justify-center items-center p-8">
  <!-- Sign In Card -->
  <div class="w-full max-w-md bg-white rounded-xl shadow-md p-8 space-y-1">
    <!-- App Icons -->
    <div class="flex justify-center">
      <i class="ri-login-box-line text-2xl bg-white shadow-lg rounded-3xl py-3 px-4"></i>
    </div>

    <!-- Header -->
    <div class="text-center space-y-2">
      <h1 class="text-2xl font-bold text-gray-900">Sign in with email</h1>
      <p class="text-gray-600 text-sm mb-4">Lorem ipsum dolor sit amet consectetur, adipisicing <br> elit. Rem, ratione
        itaque? Consectetur!</p>
    </div>

    <!-- Form -->
    <form class="space-y-4">
      <div class="space-y-4">

        <!-- Email Input -->
        <div class="relative">
          <input type="email" placeholder="Enter your email"
            class="w-full pr-4 pl-10 py-3.5 bg-gray-100 outline-none rounded-xl text-gray-900 placeholder-gray-500 ">
          <i class="ri-mail-line absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"></i>
        </div>
        <!-- password Input -->
        <div class="relative">
          <input type="password" placeholder="Password your email"
            class="w-full pr-4 pl-10 py-3.5 bg-gray-100 outline-none rounded-xl text-gray-900 placeholder-gray-500 ">
          <i class="ri-lock-password-fill absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"></i>
          <i class="ri-eye-off-line absolute right-4 top-1/2 -translate-y-1/2 text-xl text-gray-400"></i>
        </div>

        <!-- Forget button -->
        <div class="text-right">
          <a href="#" class="text-gray-600 hover:text-gray-900 font-semibold">Forget Password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full bg-gray-900 py-3.5 rounded-xl text-white hover:bg-black transition ">Get
          Started</button>
      </div>

      <!-- Social Media Divider -->
      <div class="relative">
        <div class="absolute inset-0 top-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-white text-gray-500">Or sign in with</span>
        </div>
      </div>
      <div class="flex justify-center items-center gap-4">
        <div class="flex justify-center">
          <i class="ri-google-fill text-2xl bg-white shadow-lg rounded-3xl py-3 px-4"></i>
      </div>
        <div class="flex justify-center">
          <i class="ri-facebook-fill text-2xl bg-white shadow-lg rounded-3xl py-3 px-4"></i>
      </div>
        <div class="flex justify-center">
          <i class="ri-apple-fill text-2xl bg-white shadow-lg rounded-3xl py-3 px-4"></i>
      </div>
      </div>
    </form>
  </div>
</body>

</html>
